model:
  cldm:
    target: model.cldm.ControlLDM
    params:
      latent_scale_factor: 0.18215
      unet_cfg:
        use_checkpoint: True
        image_size: 32 # unused
        in_channels: 4
        out_channels: 4
        model_channels: 320
        attention_resolutions: [ 4, 2, 1 ]
        num_res_blocks: 2
        channel_mult: [ 1, 2, 4, 4 ]
        num_head_channels: 64 # need to fix for flash-attn
        use_spatial_transformer: True
        use_linear_in_transformer: True
        transformer_depth: 1
        context_dim: 1024
        legacy: False
      vae_cfg:
        embed_dim: 4
        ddconfig:
          double_z: true
          z_channels: 4
          resolution: 256
          in_channels: 3
          out_ch: 3
          ch: 128
          ch_mult:
          - 1
          - 2
          - 4
          - 4
          num_res_blocks: 2
          attn_resolutions: []
          dropout: 0.0
      clip_cfg:
        embed_dim: 1024
        vision_cfg:
          image_size: 224
          layers: 32
          width: 1280
          head_width: 80
          patch_size: 14
        text_cfg:
          context_length: 77
          vocab_size: 49408
          width: 1024
          heads: 16
          layers: 24
        layer: "penultimate"
      controlnet_cfg:
        use_checkpoint: True
        image_size: 32 # unused
        in_channels: 4
        hint_channels: 8
        model_channels: 320
        attention_resolutions: [ 4, 2, 1 ]
        num_res_blocks: 2
        channel_mult: [ 1, 2, 4, 4 ]
        num_head_channels: 64 # need to fix for flash-attn
        use_spatial_transformer: True
        use_linear_in_transformer: True
        transformer_depth: 1
        context_dim: 1024
        legacy: False

  diffusion:
    target: model.gaussian_diffusion.Diffusion
    params:
      linear_start: 0.00085
      linear_end: 0.0120
      timesteps: 1000

dataset:
  train:
    target: dataset.codeformer.CodeformerDataset
    params:
      # training file list path
      file_list: /mnt/afs/users/konglingshun/dataset/files_extra_2.list
      file_backend_cfg:
        target: dataset.file_backend.HardDiskBackend
      # Paired crop applied to both sharp and blurred images.
      # Use crop_type: none for full-resolution training.
      out_size: 512
      crop_type: random

train:
  # pretrained sd v2.1 path; only required when resume_full is null
  sd_path: /mnt/afs/users/konglingshun/code/kpn_lr/v2-1_512-ema-pruned.ckpt
  # optional full ControlLDM checkpoint for fine-tuning, e.g. released model.pth
  resume_full: null
  # optional ControlNet and LKPN submodule checkpoints for legacy resume
  resume: null
  resume_kpn: null
  # experiment directory path
  exp_dir: deblur_extra_2

  learning_rate: 1e-4

  batch_size: 64
  num_workers: 8
  train_steps: 200000
  log_every: 50
  ckpt_every: 4000

swanlab:
  enabled: true
  mode: cloud
  project: DeblurDiff
  run_name: null
  logdir: null
  flops_image_size: 256

validation:
  enabled: true
  first_step: 1000
  num_runs: 5
  batch_size: 1
  num_workers: 0
  steps: 50
  strength: 1.0
  tiled: false
  tile_size: 512
  tile_stride: 256
  pos_prompt: ""
  neg_prompt: "low quality, blurry, low-resolution, noisy, unsharp, weird textures"
  cfg_scale: 1.0
  better_start: false
  val:
    enabled: true
    sharp_dir: ~/datasets/deblur/Gopro/test/sharp
    blur_dir: ~/datasets/deblur/Gopro/test/blur
    max_images: null
  visual:
    enabled: true
    sharp_dir: ~/datasets/deblur/Gopro/imgs/sharp
    blur_dir: ~/datasets/deblur/Gopro/imgs/blur
    max_images: 8
